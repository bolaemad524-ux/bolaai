        // --- 2. إدارة سلة المشتريات وإرسال الطلب ---
        let cart = [];

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            if(modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                renderCart();
            } else {
                modal.classList.add('hidden');
            }
        }

        function addToCart(name, priceStr, quantity) {
            const price = parseFloat(priceStr.replace(/[^\d.]/g, ''));
            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                existingItem.quantity += quantity;
            } else {
                cart.push({ name, price, quantity });
            }
            updateCartBadge();
            addBotMessage(`✅ تم إضافة <b>${quantity} x ${name}</b> للسلة بنجاح!`);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById('cart-count');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            if (totalItems > 0) {
                badge.innerText = totalItems;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 text-sm my-4">السلة فارغة حالياً</p>';
                totalEl.innerText = '0 ج';
                return;
            }

            let html = '';
            let total = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="flex justify-between items-center bg-white border p-3 rounded-lg shadow-sm">
                        <div>
                            <p class="font-bold text-sm text-gray-800">${item.name}</p>
                            <p class="text-xs text-gray-500">${item.price} ج × ${item.quantity}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-indigo-600">${itemTotal} ج</span>
                            <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-600 bg-red-50 p-1.5 rounded-full transition">
                                <i class="fas fa-trash text-sm"></i>
                            </button>

            });

            totalEl.innerText = `${total} ج`;

        // --- دالة إرسال الطلب عبر واتساب ---

            message += "برجاء تأكيد الطلب والمتابعة معي، شكراً لكم.";

            const encodedMessage = encodeURIComponent(message);
            const whatsappNumber = "201285957035";

        // --- 3. خوارزميات الذكاء والبحث ---
        function levenshtein(a, b) {
            if(a.length === 0) return b.length; 
            if(b.length === 0) return a.length; 
            const matrix = [];
            for(let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for(let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for(let i = 1; i <= b.length; i++) {
                for(let j = 1; j <= a.length; j++) {
                    if(b.charAt(i-1) == a.charAt(j-1)) {
                        matrix[i][j] = matrix[i-1][j-1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function normalizeText(text) {
            const arabicNumbers = [/٠/g, /١/g, /٢/g, /٣/g, /٤/g, /٥/g, /٦/g, /٧/g, /٨/g, /٩/g];
            for(let i=0; i<10; i++) { text = text.replace(arabicNumbers[i], i); }
            return text.replace(/[أإآ]/g, 'ا')
                       .replace(/ة/g, 'ه')
                       .replace(/ي/g, 'ى')
                       .toLowerCase()
                       .trim();
        }

        const synonyms = {
            'كوبايه': 'مج', 'كبايه': 'مج', 'كوب': 'مج', 'مجات': 'مج',
            'ميداليه': 'مدليه', 'مادليا': 'مدليه', 'ميداليات': 'مدليه',
            'فريم': 'برواز', 'براويز': 'برواز',
            'بوستر': 'تابلوه', 'لوحه': 'تابلوه', 'تابلوهات': 'تابلوه',
            'صوره': 'صور', 'كفر': 'جراب', 'اجنده': 'نوت', 'كشكول': 'نوت'
        };

        const stopWords = ['بكام', 'سعر', 'عايز', 'عاوز', 'لو', 'سمحت', 'كام', 'ايه', 'من', 'فضلك', 'عندكم', 'عندك', 'ب', 'جنيه', 'انا', 'محتاج', 'قطعة', 'قطع', 'حته'];

        function processInput(input) {
            let normalizedInput = normalizeText(input);

            // ====== جزء التحيات الجديد ======
            if (normalizedInput === "صباح الخير" || normalizedInput.includes("صباح الفل") || normalizedInput.includes("صباح الورد")) {
                return "صباح النور يا فندم! ☀️ نورت مكتب بولا عماد، أقدر أساعدك إزاي النهاردة؟";
            }
            if (normalizedInput === "مساء الخير" || normalizedInput.includes("مساء الفل") || normalizedInput.includes("مساء الورد")) {
                return "مساء النور يا فندم! 🌙 نورت مكتب بولا عماد، أقدر أساعدك إزاي؟";
            }
            if (normalizedInput.includes("السلام عليكم") || normalizedInput.includes("سلام عليكم")) {
                return "وعليكم السلام ورحمة الله وبركاته يا فندم! 👋 تحت أمرك، بتدور على منتج إيه؟";
            }
            if (normalizedInput === "اهلا" || normalizedInput.includes("مرحبا") || normalizedInput === "مرحب" || normalizedInput === "اهلا بك" || normalizedInput === "اهلا بيك") {
                return "أهلاً بيك يا فندم! 👋 نورتنا.. اكتب اسم الحاجه اللي بتدور عليها وهقولك سعرها على طول.";
            }
            if (normalizedInput === "ازيك" || normalizedInput.includes("عامل ايه") || normalizedInput.includes("اخبارك")) {
                return "الحمد لله تمام يا فندم! دايماً في خدمتك 👋 أتمنى تكون بخير. أقدر أساعدك إزاي؟";
            }
            // ================================

            let quantity = 1;
            const numMatch = normalizedInput.match(/\d+/);
            if (numMatch) {
                quantity = parseInt(numMatch[0], 10);
                if(quantity <= 0) quantity = 1;
            }

            let rawWords = normalizedInput.replace(/[^\w\s\u0600-\u06FF\d\*xX]/g, '').split(' ');
            let searchWords = [];

            rawWords.forEach(word => {
                if(!isNaN(word)) return;
                if(word.startsWith('ال') && word.length > 3) word = word.substring(2);
                if(synonyms[word]) word = synonyms[word];
                if(!stopWords.includes(word) && word.length > 1) searchWords.push(word);
            });

            if (searchWords.length === 0) {
                 return "ممكن توضحلي اسم المنتج اللي بتسأل عليه؟ (زي: 2 مج سحري، أو تابلوه 30*20)";
            }

            let matchedItems = [];
            database.forEach(item => {
                let itemName = normalizeText(item.name);
                let itemCategory = normalizeText(item.category);
                let score = 0;
                let wordsMatched = 0;

                searchWords.forEach(searchWord => {
                    if (itemName.includes(searchWord) || itemName.split(' ').includes(searchWord)) {
                        score += 20; wordsMatched++;
                    } else if (itemCategory.includes(searchWord)) {
                        score += 10; wordsMatched++;
                    } else {
                        let itemWords = itemName.split(' ');
                        let bestDist = 99;
                        itemWords.forEach(iw => {
                            let dist = levenshtein(searchWord, iw);
                            if(dist < bestDist) bestDist = dist;
                        });
                        if(searchWord.length >= 4 && bestDist <= 2) {
                            score += 12; wordsMatched++;
                        } else if (searchWord.length >= 3 && itemName.includes(searchWord.substring(0, 3))) {
                            score += 5; wordsMatched++;
                        }
                    }
                });

                if (wordsMatched === searchWords.length && searchWords.length > 1) score += 50; 
                if (score > 0) matchedItems.push({ item, score });
            });

            if (matchedItems.length > 0) {
                matchedItems.sort((a, b) => b.score - a.score);
                if (matchedItems[0].score >= 30 || (matchedItems.length === 1 && matchedItems[0].score >= 10)) {
                    let bestItem = matchedItems[0].item;
                    let singlePrice = parseFloat(bestItem.price.replace(/[^\d.]/g, ''));
                    let totalStr = quantity > 1 ? `<br><span class="text-xs text-gray-500">الإجمالي لـ ${quantity} قطع = <b class="text-indigo-600">${singlePrice * quantity} ج</b></span>` : '';
                    
                    let res = `سعر <b>${bestItem.name}</b> هو: <span class="text-indigo-600 font-bold">${bestItem.price}</span>${totalStr}`;
                    res += `<div class="mt-3 border-t pt-2">
                                <button onclick="addToCart('${bestItem.name}', '${bestItem.price}', ${quantity})" class="w-full bg-indigo-50 text-indigo-700 py-1.5 rounded-lg text-sm font-bold border border-indigo-100 hover:bg-indigo-100 transition flex justify-center items-center gap-2">
                                    <i class="fas fa-cart-plus"></i> أضف للسلة (${quantity})
                                </button>
                            </div>`;
                    return res;
                }

                let res = `لقيت أكتر من حاجة، تقصد أي واحد في دول؟<br><div class="mt-2 space-y-2">`;
                const topMatches = matchedItems.slice(0, 4);
                topMatches.forEach(match => {
                    res += `
                    <div class="bg-white border p-2 rounded-lg shadow-sm text-xs flex justify-between items-center">
                        <div><b>${match.item.name}</b><br><span class="text-indigo-600">${match.item.price}</span></div>
                        <button onclick="addToCart('${match.item.name}', '${match.item.price}', ${quantity})" class="bg-indigo-600 text-white w-7 h-7 rounded-full flex justify-center items-center hover:bg-indigo-700">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>`;
                });
                res += `</div>`;
                return res;
            }

            return "عفواً، مش لاقي المنتج ده بالتحديد عندنا. 😔<br>جرب تكتب اسمه بطريقة تانية.";
        }

        // --- 4. واجهة المحادثة ---
        const chatMessages = document.getElementById('chat-messages');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');

        function scrollToBottom() {

        function addUserMessage(text) {
            const html = `
                <div class="flex gap-2 justify-end message-enter">
                    <div class="bg-indigo-600 text-white p-3 rounded-2xl rounded-tl-none shadow-sm text-sm w-fit max-w-[85%]">
                        ${text}
                    </div>
                </div>
            `;
            chatMessages.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function addBotMessage(text) {
            const html = `
                <div class="flex gap-2 message-enter">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0 text-indigo-600">
                        <i class="fas fa-robot text-sm"></i>
                    </div>
                    <div class="bg-white p-3 rounded-2xl rounded-tr-none shadow-sm border border-gray-100 text-gray-700 text-sm w-fit max-w-[85%] leading-relaxed">
                        ${text}
                    </div>
                </div>
            `;
            chatMessages.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addUserMessage(text);
            userInput.value = '';

            const typingId = 'typing-' + Date.now();
            const typingHtml = `
                <div id="${typingId}" class="flex gap-2 message-enter">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center flex-shrink-0 text-indigo-600">
                        <i class="fas fa-robot text-sm"></i>
                    </div>
                    <div class="bg-white p-3 rounded-2xl rounded-tr-none shadow-sm border border-gray-100 text-gray-400 text-sm w-fit flex gap-1 items-center">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `;
            chatMessages.insertAdjacentHTML('beforeend', typingHtml);
            scrollToBottom();

            setTimeout(() => {
                document.getElementById(typingId).remove();
                const response = processInput(text);
                addBotMessage(response);
            }, 600);
        });

        function clearChat() {
            chatMessages.innerHTML = '';
            addBotMessage('أهلاً بك مرة أخرى! السلة كما هي، هل تبحث عن شيء آخر؟');
        }
    </script>
</body>
</html>
