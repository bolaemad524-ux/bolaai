<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مساعد بولا عماد الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0b141a; margin: 0; overflow: hidden; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .avatar-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        #avatar-mouth { transform-origin: center 120px; transition: transform 0.1s; }
        /* تأثير عند الضغط على الزرار */
        .btn-active:active { transform: scale(0.85); background-color: #059669; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col text-slate-100 bg-[#0b141a]">

    <input type="password" id="apiKey" value="AIzaSyAcKYoSB5EeovMe9xOB3C9wLvQqkppXnNs" class="hidden" />

    <header class="bg-slate-800 border-b border-slate-700 py-3 px-4 flex items-center gap-3 shadow-md shrink-0">
        <div class="w-12 h-12 bg-sky-500 rounded-full flex items-center justify-center avatar-float shadow-lg">
            <i data-lucide="bot" class="text-white w-7 h-7"></i>
        </div>
        <div>
            <h1 class="text-sm font-bold text-white">بولا عماد <span class="text-emerald-400 text-[10px]">(مساعد ذكي)</span></h1>
            <p id="statusText" class="text-slate-400 text-[10px]">متصل وجاهز لخدمتك</p>
        </div>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto chat-scroll p-4 space-y-4 max-w-2xl mx-auto w-full">
        <div class="flex justify-start">
            <div class="bg-slate-800 p-3 rounded-2xl rounded-tr-none border border-slate-700 max-w-[85%] text-sm shadow-sm">
                أهلاً بيك يا فندم في مكتب واستوديو بولا عماد. أقدر أساعدك إزاي؟ 🥰
            </div>
        </div>
    </main>

    <div id="typingIndicator" class="hidden px-4 pb-2 max-w-2xl mx-auto w-full">
        <div class="text-slate-500 text-[10px] animate-pulse">جاري الرد...</div>
    </div>

    <footer class="bg-slate-800 p-3 border-t border-slate-700 shrink-0">
        <div class="max-w-2xl mx-auto flex items-center gap-2">
            <button id="attachBtn" class="p-2.5 bg-slate-700 text-slate-300 rounded-full w-10 h-10 flex items-center justify-center"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
            <input type="file" id="imageInput" accept="image/*" class="hidden" />
            
            <div class="flex-1 bg-slate-900 rounded-xl border border-slate-600 focus-within:border-emerald-500 overflow-hidden">
                <textarea id="messageInput" rows="1" class="w-full bg-transparent text-slate-100 p-3 focus:outline-none resize-none max-h-24 text-sm" placeholder="اكتب رسالتك..."></textarea>
            </div>

            <button id="sendBtn" class="btn-active p-3 bg-emerald-600 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg">
                <i data-lucide="send" class="w-6 h-6 rotate-180"></i>
            </button>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const statusText = document.getElementById('statusText');
        const apiKey = document.getElementById('apiKey').value;
        const avatarMouth = document.getElementById('avatar-mouth');

        let isProcessing = false;

        const STUDIO_DATA = {
            prices: "التابلوهات: 15*10 (35ج)، 21*15 (65ج)، 30*20 (85ج)، 40*30 (135ج). المجات: أبيض 100ج، بايركس 85ج، سحري 150ج. الصور: 21*15 بـ 10ج. العنوان: الاربعين - شارع صدقي.",
            booking: "الحجز: شرفنا في المكتب أو كاش على 01285957035."
        };

        function append(sender, text) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} mb-3`;
            div.innerHTML = `<div class="p-3 rounded-2xl max-w-[90%] text-sm ${sender === 'user' ? 'bg-emerald-700 text-white' : 'bg-slate-800 border border-slate-700 text-slate-100'} shadow-md">${text}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function startChat() {
            const val = messageInput.value.trim();
            if (!val || isProcessing) return;

            isProcessing = true;
            append('user', val);
            messageInput.value = "";
            typingIndicator.classList.remove('hidden');

            // حماية للزرار: لو الـ AI اتأخر أكتر من 7 ثواني، بنفك الحظر عن الزرار
            const safetyTimeout = setTimeout(() => { isProcessing = false; typingIndicator.classList.add('hidden'); }, 7000);

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "أنت مساعد مكتب بولا عماد. رد بالمصري وباختصار: " + STUDIO_DATA.prices + ". الرسالة: " + val }] }] })
                });
                const data = await res.json();
                clearTimeout(safetyTimeout);
                
                const reply = data.candidates[0].content.parts[0].text;
                append('ai', reply);
                
                // تحريك بسيط للفم عند الرد
                if(avatarMouth) avatarMouth.style.transform = "scaleY(2)";
                setTimeout(() => { if(avatarMouth) avatarMouth.style.transform = "scaleY(1)"; }, 1500);

            } catch (e) {
                append('ai', "انتظر سيتم الرد عليك في أقرب وقت من فريق العمل.");
            } finally {
                isProcessing = false;
                typingIndicator.classList.add('hidden');
            }
        }

        // تشغيل الإرسال عند الضغط على الزرار أو الـ Enter
        sendBtn.addEventListener('click', (e) => { e.preventDefault(); startChat(); });
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startChat(); } });

        // زرار المرفقات
        document.getElementById('attachBtn').onclick = () => document.getElementById('imageInput').click();
        document.getElementById('imageInput').onchange = () => append('ai', "انتظر سيتم الرد عليك فوراً من خلال فريق العمل.");
    </script>
</body>
</html>
