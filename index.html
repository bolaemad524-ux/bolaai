<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مساعد بولا عماد الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0b141a; margin: 0; overflow: hidden; touch-action: manipulation; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 20px; }
        .avatar-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        #avatar-mouth { transform-origin: center 120px; transition: transform 0.1s; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col text-slate-100 bg-[#0b141a]">

    <input type="password" id="apiKey" value="AIzaSyAcKYoSB5EeovMe9xOB3C9wLvQqkppXnNs" class="hidden" />

    <header class="bg-slate-800 border-b border-slate-700 py-3 px-4 flex items-center gap-3 shadow-md shrink-0">
        <div class="w-14 h-14 bg-sky-500 rounded-full flex items-center justify-center avatar-float shadow-lg">
            <svg viewBox="0 0 200 200" class="w-10 h-10">
                <rect x="55" y="30" width="90" height="100" rx="35" fill="#1e293b" stroke="#38bdf8" stroke-width="4"/>
                <rect x="65" y="45" width="70" height="70" rx="20" fill="#020617"/>
                <g fill="#10b981"><circle cx="85" cy="65" r="7" /><circle cx="115" cy="65" r="7" /></g>
                <rect id="avatar-mouth" x="80" y="90" width="40" height="4" rx="2" fill="#10b981" />
            </svg>
        </div>
        <div>
            <h1 class="text-sm font-bold text-white">بولا عماد <span class="text-emerald-400 text-[10px]">(مساعد ذكي)</span></h1>
            <p id="statusText" class="text-slate-400 text-[10px]">متصل</p>
        </div>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto chat-scroll p-4 space-y-4 max-w-2xl mx-auto w-full pb-6">
        <div class="flex justify-start">
            <div class="bg-slate-800 p-3 rounded-2xl rounded-tr-none border border-slate-700 max-w-[85%] text-[15px] shadow-sm leading-relaxed">
                أهلاً بيك يا فندم في مكتب واستوديو بولا عماد. أقدر أساعدك إزاي؟ 🥰
            </div>
        </div>
    </main>

    <div id="typingIndicator" class="hidden px-4 pb-4 max-w-2xl mx-auto w-full">
        <div class="bg-slate-800 w-16 p-3 rounded-2xl rounded-tr-none flex justify-center border border-slate-700">
            <div class="flex gap-1"><span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span><span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span></div>
        </div>
    </div>

    <footer class="bg-slate-800 p-3 border-t border-slate-700 shrink-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center gap-2">
            <button id="attachBtn" class="p-2.5 bg-slate-700 text-slate-300 rounded-full w-12 h-12 flex items-center justify-center"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
            <input type="file" id="imageInput" accept="image/*" class="hidden" />
            
            <div class="flex-1 bg-slate-900 rounded-xl border-2 border-slate-600 focus-within:border-emerald-500 overflow-hidden shadow-inner">
                <textarea id="messageInput" rows="1" class="w-full bg-transparent text-slate-100 p-3 focus:outline-none resize-none max-h-32 text-[16px]" placeholder="اكتب رسالتك هنا..."></textarea>
            </div>

            <button id="sendBtn" class="p-3 bg-emerald-600 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                <i data-lucide="send" class="w-6 h-6 rotate-180"></i>
            </button>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const statusText = document.getElementById('statusText');
        const apiKey = document.getElementById('apiKey').value;
        const avatarMouth = document.getElementById('avatar-mouth');

        let isProcessing = false;

        const STUDIO_DATA = {
            prices: "المجات: أبيض 100ج، بايركس 85ج، سحري 150ج. التابلوهات: تبدأ من 35ج لمقاس 10*15. العنوان: شارع صدقي بجوار الراعي. الحجز: 01285957035.",
            info: "مكتب واستوديو بولا عماد متخصص في الطباعة والهدايا والتابلوهات."
        };

        function append(sender, text) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'User' ? 'justify-end' : 'justify-start'} mb-4`;
            div.innerHTML = `<div class="p-3 px-4 rounded-2xl max-w-[85%] text-[15px] shadow-md ${sender === 'User' ? 'bg-emerald-700 text-white rounded-tl-none' : 'bg-slate-800 text-slate-100 rounded-tr-none border border-slate-700 leading-relaxed'}">${text}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function processChat(text) {
            if (isProcessing) return;
            isProcessing = true;
            typingIndicator.classList.remove('hidden');
            statusText.textContent = "جاري الكتابة...";

            let responseText = "";
            const lowerText = text.toLowerCase();

            // 1. محاولة الرد من البيانات المحلية أولاً لضمان السرعة والدقة
            if (lowerText.includes("سعر") || lowerText.includes("بكام") || lowerText.includes("مج") || lowerText.includes("تابلو")) {
                responseText = STUDIO_DATA.prices;
            } else if (lowerText.includes("عنوان") || lowerText.includes("فين")) {
                responseText = "عنوانا: الاربعين – شارع صدقي - بجوار محل الراعى للكهرباء - أمام أشرف فاروق للحدايد.";
            } else if (lowerText.includes("خير") || lowerText.includes("سلام")) {
                responseText = "أهلاً بيك يا فندم في مكتب بولا عماد، منورنا! أؤمرني أقدر أساعدك إزاي؟";
            }

            // 2. لو مفيش رد محلي، نكلم جوجل
            if (!responseText) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "أنت مساعد بشري لمكتب بولا عماد. رد بالمصري وباختصار شديد بناءً على: " + STUDIO_DATA.prices + ". الرسالة: " + text }] }] })
                    });
                    const data = await res.json();
                    responseText = data.candidates[0].content.parts[0].text;
                } catch (e) {
                    responseText = "تحت أمرك يا فندم، اسألني عن أسعار المجات أو التابلوهات أو العنوان وهفيدك فوراً.";
                }
            }

            // 3. انتظار وقت الكتابة (ثانيتين)
            await new Promise(resolve => setTimeout(resolve, 2000));

            append('AI', responseText);
            
            // تحريك الفم
            if(avatarMouth) avatarMouth.style.transform = "scaleY(2.5)";
            setTimeout(() => { if(avatarMouth) avatarMouth.style.transform = "scaleY(1)"; }, 1500);

            isProcessing = false;
            typingIndicator.classList.add('hidden');
            statusText.textContent = "متصل";
        }

        function handleSend() {
            const val = messageInput.value.trim();
            if (val && !isProcessing) {
                append('User', val);
                messageInput.value = "";
                processChat(val);
            }
        }

        sendBtn.onclick = handleSend;
        messageInput.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
        attachBtn.onclick = () => imageInput.click();
        imageInput.onchange = () => append('AI', "وصلت الصورة يا فندم، ثواني هشوفها وأرد عليك.");
    </script>
</body>
</html>
